<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>MLB Merch Tracker</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;min-height:100vh;background:#f0f2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1a1a1a}

    /* ── Header ── */
    header{background:#002D62;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 2px 6px rgba(0,0,0,.4)}
    header h1{font-size:1.1rem;font-weight:700}
    header small{font-size:.75rem;opacity:.75}

    /* ── Nav Tabs ── */.tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;position:sticky;top:49px;z-index:40}.tab{flex:1;padding:11px 4px;text-align:center;font-size:.72rem;font-weight:700;color:#888;cursor:pointer;border-bottom:3px solid transparent;transition:all.2s;-webkit-tap-highlight-color:transparent;user-select:none}.tab.active{color:#002D62;border-bottom-color:#002D62}.tab span{display:block;font-size:1.1rem;margin-bottom:2px}

    /* ── Toolbar ── */.toolbar{display:flex;gap:8px;flex-wrap:wrap;padding:10px 12px;background:#fff;border-bottom:1px solid #ddd}.toolbar button{flex:1;min-width:100px;padding:9px 8px;border:none;border-radius:8px;font-size:.8rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.toolbar button:active{opacity:.7}.tb-export{background:#002D62;color:#fff}.tb-sort{background:#e8e8e8;color:#333}.tb-reset{background:#D50032;color:#fff}

    /* ── Grand Total Banner ── */.grand-total{text-align:center;padding:8px 12px;background:#fff;border-bottom:1px solid #eee;font-size:.85rem;color:#555}.grand-total b{color:#002D62;font-size:1rem}

    /* ── Pages ── */.page{display:none}.page.active{display:block}

    /* ── Team Grid ── */.section-label{padding:12px 14px 4px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;padding:0 12px 12px}.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.1);overflow:hidden;display:flex;flex-direction:column}.card-head{background:#002D62;color:#fff;padding:8px 10px;font-size:.75rem;font-weight:700;line-height:1.3;min-height:44px;display:flex;align-items:center}.card-body{display:flex;align-items:center;gap:6px;padding:8px 10px}.log-btn{flex:1;background:#D50032;color:#fff;border:none;border-radius:8px;padding:10px 4px;font-size:.85rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.log-btn:active{background:#a00025}.badge{width:38px;height:38px;border-radius:50%;background:#002D62;color:#fff;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}.badge.lit{background:#FFD700;color:#002D62}

    /* ── Rankings Page ── */.rankings-wrap{padding:12px}.rank-card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:8px;display:flex;align-items:center;padding:12px 14px;gap:12px}.rank-pos{font-size:1.3rem;width:36px;text-align:center;flex-shrink:0}.rank-info{flex:1;min-width:0}.rank-name{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rank-div{font-size:.72rem;color:#888;margin-top:2px}.rank-bar-wrap{width:90px;flex-shrink:0}.rank-bar-bg{background:#f0f0f0;border-radius:4px;height:8px;overflow:hidden}.rank-bar-fill{background:#002D62;height:8px;border-radius:4px;transition:width.4s ease}.rank-count{font-size:1rem;font-weight:700;color:#002D62;width:28px;text-align:right;flex-shrink:0}.rank-zero.rank-name{color:#bbb}.rank-zero.rank-count{color:#ccc}.rank-zero.rank-bar-fill{background:#ddd}.rank-divider{padding:8px 14px 4px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888}

    /* ── Activity Log Page ── */.activity-wrap{padding:12px}.activity-toolbar{display:flex;gap:8px;margin-bottom:12px}.activity-toolbar button{flex:1;padding:8px;border:none;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}.act-filter-btn{background:#e8e8e8;color:#333}.act-filter-btn.active{background:#002D62;color:#fff}.activity-empty{text-align:center;color:#aaa;padding:40px 20px;font-size:.9rem}.activity-entry{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px}.activity-entry-left{flex:1;min-width:0}.activity-team{font-size:.88rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.activity-div{font-size:.72rem;color:#888;margin-top:2px}.activity-time{font-size:.75rem;color:#aaa;margin-top:3px}.activity-num{background:#002D62;color:#fff;border-radius:6px;padding:4px 8px;font-size:.75rem;font-weight:700;flex-shrink:0}.activity-del{background:none;border:none;color:#D50032;font-size:1rem;cursor:pointer;padding:2px 6px;flex-shrink:0;-webkit-tap-highlight-color:transparent}.activity-date-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#888;padding:8px 4px 4px;margin-top:4px}

    /* ── Team Log Modal ── */.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center}.overlay.open{display:flex}.modal{background:#fff;border-radius:16px;width:92%;max-width:420px;max-height:78vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.3)}.modal-hd{background:#002D62;color:#fff;padding:14px 16px;display:flex;justify-content:space-between;align-items:center}.modal-hd h3{font-size:.95rem;font-weight:700}.modal-close{background:none;border:none;color:#fff;font-size:1.4rem;cursor:pointer;line-height:1;padding:0 4px}.modal-bd{overflow-y:auto;padding:14px 16px;flex:1}.modal-bd p{font-size:.82rem;color:#666;margin-bottom:10px}.log-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:.8rem;gap:8px}.log-row:last-child{border-bottom:none}.log-ts{color:#555;flex:1}.del{background:none;border:none;color:#D50032;font-size:1rem;cursor:pointer;padding:2px 6px;-webkit-tap-highlight-color:transparent}.empty{text-align:center;color:#aaa;padding:24px 0;font-size:.9rem}

    /* ── Confirm Modal ── */.confirm-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center}.confirm-wrap.open{display:flex}.confirm-box{background:#fff;border-radius:14px;padding:24px 20px;width:88%;max-width:340px;text-align:center}.confirm-box h3{color:#D50032;margin-bottom:8px}.confirm-box p{font-size:.85rem;color:#666;margin-bottom:20px}.confirm-btns{display:flex;gap:12px;justify-content:center}.confirm-btns button{padding:10px 22px;border:none;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer}.cy{background:#D50032;color:#fff}.cn{background:#e0e0e0;color:#333}

    /* ── Toast ── */.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);background:#222;color:#fff;padding:10px 22px;border-radius:24px;font-size:.85rem;z-index:400;transition:transform.3s ease;white-space:nowrap;pointer-events:none}.toast.show{transform:translateX(-50%) translateY(0)}

    footer{text-align:center;padding:16px;font-size:.72rem;color:#bbb}
  </style>
</head>
<body>

<header>
  <h1>⚾ MLB Merch Tracker</h1>
  <small id="hdate"></small>
</header>

<!-- Nav Tabs -->
<div class="tabs">
  <div class="tab active" id="tab-tracker" onclick="switchTab('tracker')">
    <span>⚾</span>TRACKER
  </div>
  <div class="tab" id="tab-rankings" onclick="switchTab('rankings')">
    <span>🏆</span>RANKINGS
  </div>
  <div class="tab" id="tab-log" onclick="switchTab('log')">
    <span>📋</span>ALL LOGS
  </div>
</div>

<!-- ── PAGE: TRACKER ── -->
<div class="page active" id="page-tracker">
  <div class="toolbar">
    <button class="tb-export" onclick="exportCSV()">📥 Export CSV</button>
    <button class="tb-sort"   onclick="toggleSort()">🔃 Sort by Count</button>
    <button class="tb-reset"  onclick="openConfirm()">🗑 Reset All</button>
  </div>
  <div class="grand-total">Total sightings: <b id="gtotal">0</b></div>
  <div id="app"></div>
</div>

<!-- ── PAGE: RANKINGS ── -->
<div class="page" id="page-rankings">
  <div class="grand-total">Total sightings: <b id="gtotal-rank">0</b></div>
  <div class="rankings-wrap" id="rankings-wrap"></div>
</div>

<!-- ── PAGE: ALL LOGS ── -->
<div class="page" id="page-log">
  <div class="grand-total">Total sightings: <b id="gtotal-log">0</b></div>
  <div class="activity-wrap">
    <div class="activity-toolbar">
      <button class="act-filter-btn active" id="filter-all"    onclick="setLogFilter('all')">All Teams</button>
      <button class="act-filter-btn"        id="filter-today"  onclick="setLogFilter('today')">Today</button>
      <button class="act-filter-btn"        id="filter-week"   onclick="setLogFilter('week')">This Week</button>
    </div>
    <div id="activity-list"></div>
  </div>
</div>

<!-- Team Log Modal -->
<div class="overlay" id="log-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-hd">
      <h3 id="modal-title">Log</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-bd" id="modal-bd"></div>
  </div>
</div>

<!-- Confirm Reset -->
<div class="confirm-wrap" id="confirm-wrap">
  <div class="confirm-box">
    <h3>Reset All Data?</h3>
    <p>This permanently deletes every logged sighting. This cannot be undone.</p>
    <div class="confirm-btns">
      <button class="cy" onclick="doReset()">Yes, Reset</button>
      <button class="cn" onclick="closeConfirm()">Cancel</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<footer>Data saved on your device · Tap count badge to view team log</footer>

<script>
(function(){
"use strict";

// ── Teams ─────────────────────────────────────────────────────────────────────
var TEAMS=[
  {name:"Baltimore Orioles",    div:"AL East"},
  {name:"Boston Red Sox",       div:"AL East"},
  {name:"New York Yankees",     div:"AL East"},
  {name:"Tampa Bay Rays",       div:"AL East"},
  {name:"Toronto Blue Jays",    div:"AL East"},
  {name:"Chicago White Sox",    div:"AL Central"},
  {name:"Cleveland Guardians",  div:"AL Central"},
  {name:"Detroit Tigers",       div:"AL Central"},
  {name:"Kansas City Royals",   div:"AL Central"},
  {name:"Minnesota Twins",      div:"AL Central"},
  {name:"Houston Astros",       div:"AL West"},
  {name:"Los Angeles Angels",   div:"AL West"},
  {name:"Athletics",            div:"AL West"},
  {name:"Seattle Mariners",     div:"AL West"},
  {name:"Texas Rangers",        div:"AL West"},
  {name:"Atlanta Braves",       div:"NL East"},
  {name:"Miami Marlins",        div:"NL East"},
  {name:"New York Mets",        div:"NL East"},
  {name:"Philadelphia Phillies",div:"NL East"},
  {name:"Washington Nationals", div:"NL East"},
  {name:"Chicago Cubs",         div:"NL Central"},
  {name:"Cincinnati Reds",      div:"NL Central"},
  {name:"Milwaukee Brewers",    div:"NL Central"},
  {name:"Pittsburgh Pirates",   div:"NL Central"},
  {name:"St. Louis Cardinals",  div:"NL Central"},
  {name:"Arizona Diamondbacks", div:"NL West"},
  {name:"Colorado Rockies",     div:"NL West"},
  {name:"Los Angeles Dodgers",  div:"NL West"},
  {name:"San Diego Padres",     div:"NL West"},
  {name:"San Francisco Giants", div:"NL West"}
];

// ── State ─────────────────────────────────────────────────────────────────────
var data={};
var sortOn=false;
var currentTab="tracker";
var logFilter="all";
var KEY="mlb_v3";

// ── Storage ───────────────────────────────────────────────────────────────────
function load(){
  try{var r=localStorage.getItem(KEY);if(r)data=JSON.parse(r);}catch(e){data={};}
  TEAMS.forEach(function(t){if(!data[t.name])data[t.name]=[];});
}
function save(){
  try{localStorage.setItem(KEY,JSON.stringify(data));}catch(e){}
}

// ── Grand Total ───────────────────────────────────────────────────────────────
function grandTotal(){
  var t=0;
  TEAMS.forEach(function(t2){t+=(data[t2.name]||[]).length;});
  return t;
}
function updateTotals(){
  var t=grandTotal();
  ["gtotal","gtotal-rank","gtotal-log"].forEach(function(id){
    var el=document.getElementById(id);
    if(el)el.textContent=t;
  });
}

// ── Tab Switching ─────────────────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  ["tracker","rankings","log"].forEach(function(t){
    document.getElementById("page-"+t).classList.toggle("active",t===tab);
    document.getElementById("tab-"+t).classList.toggle("active",t===tab);
  });
  if(tab==="rankings") renderRankings();
  if(tab==="log")      renderActivityLog();
}

// ── TRACKER PAGE ──────────────────────────────────────────────────────────────
function render(){
  var app=document.getElementById("app");
  if(!app)return;
  app.innerHTML="";
  var list=TEAMS.slice();
  if(sortOn){
    list.sort(function(a,b){return(data[b.name]||[]).length-(data[a.name]||[]).length;});
    var lbl=document.createElement("div");
    lbl.className="section-label";
    lbl.textContent="All Teams — Sorted by Count";
    app.appendChild(lbl);
    var g=document.createElement("div");
    g.className="grid";
    list.forEach(function(t){g.appendChild(makeCard(t));});
    app.appendChild(g);
  } else {
    var divs=[];
    TEAMS.forEach(function(t){if(divs.indexOf(t.div)<0)divs.push(t.div);});
    divs.forEach(function(div){
      var lbl=document.createElement("div");
      lbl.className="section-label";
      lbl.textContent=div;
      app.appendChild(lbl);
      var g=document.createElement("div");
      g.className="grid";
      TEAMS.filter(function(t){return t.div===div;}).forEach(function(t){g.appendChild(makeCard(t));});
      app.appendChild(g);
    });
  }
  updateTotals();
}

function makeCard(team){
  var count=(data[team.name]||[]).length;
  var card=document.createElement("div");
  card.className="card";
  var head=document.createElement("div");
  head.className="card-head";
  head.textContent=team.name;
  card.appendChild(head);
  var body=document.createElement("div");
  body.className="card-body";
  var btn=document.createElement("button");
  btn.className="log-btn";
  btn.textContent="+ Log";
  btn.addEventListener("click",function(e){e.stopPropagation();logSighting(team.name);});
  body.appendChild(btn);
  var badge=document.createElement("div");
  badge.className="badge"+(count>0?" lit":"");
  badge.textContent=count;
  badge.addEventListener("click",function(e){e.stopPropagation();openModal(team.name);});
  body.appendChild(badge);
  card.appendChild(body);
  return card;
}

// ── RANKINGS PAGE ─────────────────────────────────────────────────────────────
function renderRankings(){
  var wrap=document.getElementById("rankings-wrap");
  if(!wrap)return;
  wrap.innerHTML="";

  // Build sorted list
  var ranked=TEAMS.map(function(t){
    return{name:t.name,div:t.div,count:(data[t.name]||[]).length};
  }).sort(function(a,b){
    if(b.count!==a.count)return b.count-a.count;
    return a.name.localeCompare(b.name);
  });

  var max=ranked[0]?ranked[0].count:1;
  if(max===0)max=1;

  // Medal / position emoji
  function posLabel(i,count){
    if(count===0)return"—";
    if(i===0)return"🥇";
    if(i===1)return"🥈";
    if(i===2)return"🥉";
    return""+(i+1);
  }

  // Divider before "zero" section
  var zeroDividerAdded=false;

  ranked.forEach(function(item,i){
    if(!zeroDividerAdded && item.count===0){
      zeroDividerAdded=true;
      var div=document.createElement("div");
      div.className="rank-divider";
      div.textContent="Not yet sighted";
      wrap.appendChild(div);
    }

    var card=document.createElement("div");
    card.className="rank-card"+(item.count===0?" rank-zero":"");

    // Position
    var pos=document.createElement("div");
    pos.className="rank-pos";
    pos.textContent=posLabel(i,item.count);
    card.appendChild(pos);

    // Info
    var info=document.createElement("div");
    info.className="rank-info";
    var name=document.createElement("div");
    name.className="rank-name";
    name.textContent=item.name;
    info.appendChild(name);
    var divLabel=document.createElement("div");
    divLabel.className="rank-div";
    divLabel.textContent=item.div;
    info.appendChild(divLabel);
    card.appendChild(info);

    // Bar
    var barWrap=document.createElement("div");
    barWrap.className="rank-bar-wrap";
    var barBg=document.createElement("div");
    barBg.className="rank-bar-bg";
    var barFill=document.createElement("div");
    barFill.className="rank-bar-fill";
    barFill.style.width=Math.round((item.count/max)*100)+"%";
    barBg.appendChild(barFill);
    barWrap.appendChild(barBg);
    card.appendChild(barWrap);

    // Count
    var cnt=document.createElement("div");
    cnt.className="rank-count";
    cnt.textContent=item.count;
    card.appendChild(cnt);

    wrap.appendChild(card);
  });

  updateTotals();
}

// ── ACTIVITY LOG PAGE ─────────────────────────────────────────────────────────
function setLogFilter(f){
  logFilter=f;
  ["all","today","week"].forEach(function(x){
    document.getElementById("filter-"+x).classList.toggle("active",x===f);
  });
  renderActivityLog();
}

function renderActivityLog(){
  var list=document.getElementById("activity-list");
  if(!list)return;
  list.innerHTML="";

  // Build flat list of all entries
  var all=[];
  TEAMS.forEach(function(t){
    (data[t.name]||[]).forEach(function(ts,idx){
      all.push({team:t.name,div:t.div,ts:ts,idx:idx});
    });
  });

  // Apply filter
  var now=new Date();
  var todayStr=now.toDateString();
  var weekAgo=new Date(now.getTime()-7*24*60*60*1000);

  if(logFilter==="today"){
    all=all.filter(function(e){return new Date(e.ts).toDateString()===todayStr;});
  } else if(logFilter==="week"){
    all=all.filter(function(e){return new Date(e.ts)>=weekAgo;});
  }

  // Sort newest first
  all.sort(function(a,b){return b.ts.localeCompare(a.ts);});

  if(all.length===0){
    var em=document.createElement("div");
    em.className="activity-empty";
    em.textContent=logFilter==="today"?"No sightings logged today."
                  :logFilter==="week" ?"No sightings logged this week."
                  :"No sightings logged yet. Start tapping + Log!";
    list.appendChild(em);
    updateTotals();
    return;
  }

  // Group by date
  var groups={};
  var groupOrder=[];
  all.forEach(function(e){
    var d=new Date(e.ts).toDateString();
    if(!groups[d]){groups[d]=[];groupOrder.push(d);}
    groups[d].push(e);
  });

  groupOrder.forEach(function(dateStr){
    // Date label
    var label=document.createElement("div");
    label.className="activity-date-label";
    var d=new Date(dateStr);
    label.textContent=d.toLocaleDateString(undefined,{weekday:"long",year:"numeric",month:"long",day:"numeric"});
    list.appendChild(label);

    groups[dateStr].forEach(function(e,groupIdx){
      var entry=document.createElement("div");
      entry.className="activity-entry";

      var left=document.createElement("div");
      left.className="activity-entry-left";

      var teamEl=document.createElement("div");
      teamEl.className="activity-team";
      teamEl.textContent=e.team;
      left.appendChild(teamEl);

      var divEl=document.createElement("div");
      divEl.className="activity-div";
      divEl.textContent=e.div;
      left.appendChild(divEl);

      var timeEl=document.createElement("div");
      timeEl.className="activity-time";
      timeEl.textContent=new Date(e.ts).toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit",second:"2-digit"});
      left.appendChild(timeEl);

      entry.appendChild(left);

      // Entry number badge
      var num=document.createElement("div");
      num.className="activity-num";
      num.textContent="#"+(e.idx+1);
      entry.appendChild(num);

      // Delete button
      var del=document.createElement("button");
      del.className="activity-del";
      del.textContent="🗑";
      del.title="Delete entry";
      (function(tn,ti){
        del.addEventListener("click",function(){
          data[tn].splice(ti,1);
          save();
          render();
          renderActivityLog();
          renderRankings();
          showToast("🗑 Entry deleted");
        });
      })(e.team,e.idx);
      entry.appendChild(del);

      list.appendChild(entry);
    });
  });

  updateTotals();
}

// ── Logging ───────────────────────────────────────────────────────────────────
function logSighting(name){
  if(!data[name])data[name]=[];
  data[name].push(new Date().toISOString());
  save();
  render();
  if(currentTab==="rankings")renderRankings();
  if(currentTab==="log")renderActivityLog();
  showToast("✅ Logged: "+name);
}

function deleteEntry(name,idx){
  if(data[name])data[name].splice(idx,1);
  save();
  render();
  renderRankings();
  renderActivityLog();
  openModal(name);
}

// ── Team Log Modal ────────────────────────────────────────────────────────────
function openModal(name){
  var entries=data[name]||[];
  document.getElementById("modal-title").textContent="📋 "+name;
  var bd=document.getElementById("modal-bd");
  bd.innerHTML="";
  if(entries.length===0){
    var em=document.createElement("div");em.className="empty";
    em.textContent="No sightings logged yet.";bd.appendChild(em);
  } else {
    var info=document.createElement("p");
    info.textContent=entries.length+" sighting"+(entries.length!==1?"s":"")+" logged:";
    bd.appendChild(info);
    entries.slice().reverse().forEach(function(ts,ri){
      var realIdx=entries.length-1-ri;
      var fmt=new Date(ts).toLocaleString(undefined,{year:"numeric",month:"short",day:"numeric",hour:"2-digit",minute:"2-digit",second:"2-digit"});
      var row=document.createElement("div");row.className="log-row";
      var span=document.createElement("span");span.className="log-ts";
      span.textContent="#"+(realIdx+1)+"  "+fmt;row.appendChild(span);
      var del=document.createElement("button");del.className="del";del.textContent="🗑";
      (function(n,i){del.addEventListener("click",function(){deleteEntry(n,i);});})(name,realIdx);
      row.appendChild(del);bd.appendChild(row);
    });
  }
  document.getElementById("log-overlay").classList.add("open");
}

function closeModal(){document.getElementById("log-overlay").classList.remove("open");}
function handleOverlayClick(e){if(e.target===document.getElementById("log-overlay"))closeModal();}

// ── Sort / Reset ──────────────────────────────────────────────────────────────
function toggleSort(){sortOn=!sortOn;render();}
function openConfirm(){document.getElementById("confirm-wrap").classList.add("open");}
function closeConfirm(){document.getElementById("confirm-wrap").classList.remove("open");}
function doReset(){
  TEAMS.forEach(function(t){data[t.name]=[];});
  save();closeConfirm();render();
  renderRankings();renderActivityLog();
  showToast("🗑 All data reset.");
}

// ── CSV Export ────────────────────────────────────────────────────────────────
function exportCSV(){
  var rows=[["Timestamp","Team","League"]];
  TEAMS.forEach(function(t){
    (data[t.name]||[]).forEach(function(ts){rows.push([ts,t.name,t.div]);});
  });
  var hdr=rows.shift();
  rows.sort(function(a,b){return a[0]<b[0]?-1:1;});
  rows.unshift(hdr);
  var csv=rows.map(function(r){return r.map(function(c){return'"'+c+'"';}).join(",");}).join("\n");
  var blob=new Blob([csv],{type:"text/csv"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;a.download="mlb_merch_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showToast("📥 CSV exported!");
}

// ── Toast ─────────────────────────────────────────────────────────────────────
var toastTimer;
function showToast(msg){
  var t=document.getElementById("toast");if(!t)return;
  t.textContent=msg;t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){t.classList.remove("show");},2500);
}

// ── Expose globals ────────────────────────────────────────────────────────────
window.switchTab=switchTab;
window.exportCSV=exportCSV;
window.toggleSort=toggleSort;
window.openConfirm=openConfirm;
window.closeConfirm=closeConfirm;
window.doReset=doReset;
window.closeModal=closeModal;
window.handleOverlayClick=handleOverlayClick;
window.setLogFilter=setLogFilter;

// ── Init ──────────────────────────────────────────────────────────────────────
function init(){
  var hd=document.getElementById("hdate");
  if(hd)hd.textContent=new Date().toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
  load();
  render();
}

if(document.readyState==="complete"||document.readyState==="interactive"){init();}
else{document.addEventListener("DOMContentLoaded",init);window.addEventListener("load",init);}

})();
</script>
</body>
</html>
